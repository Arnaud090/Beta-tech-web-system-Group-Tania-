<!DOCTYPE html>
<html>
<head>
    <title>Employee Registration - Beta Tech</title>
</head>

<body style="font-family: Arial; background-color:#e6f0ff;">

    <h2 style="text-align:center; color:white; background-color:#0056b3; padding:15px;">
        Beta Tech Company - Employee Registration
    </h2>

    <form style="width:500px; margin:auto; background:white; padding:20px; border:2px solid #0056b3; border-radius:10px;">

        <label style="color:#0056b3;"><b>First Name:</b></label><br>
        <input type="text" name="firstname" style="width:100%; padding:8px; border:1px solid #0056b3;"><br><br>

        <label style="color:#0056b3;"><b>Last Name:</b></label><br>
        <input type="text" name="lastname" style="width:100%; padding:8px; border:1px solid #0056b3;"><br><br>

        <label style="color:#0056b3;"><b>Email:</b></label><br>
        <input type="email" name="email" style="width:100%; padding:8px; border:1px solid #0056b3;"><br><br>

        <label style="color:#0056b3;"><b>Phone Number:</b></label><br>
        <input type="tel" name="phone" style="width:100%; padding:8px; border:1px solid #0056b3;"><br><br>

        <label style="color:#0056b3;"><b>Gender:</b></label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female<br><br>

        <label style="color:#0056b3;"><b>Department:</b></label><br>
        <select style="width:100%; padding:8px; border:1px solid #0056b3;">
            <option>IT</option>
            <option>Human Resources</option>
            <option>Finance</option>
            <option>Marketing</option>
        </select><br><br>

        <label style="color:#0056b3;"><b>Address:</b></label><br>
        <textarea rows="4" style="width:100%; border:1px solid #0056b3;"></textarea><br><br>

        <label style="color:#0056b3;"><b>Password:</b></label><br>
        <input type="password" style="width:100%; padding:8px; border:1px solid #0056b3;"><br><br>

        <input type="submit" value="Register Employee"
        style="background-color:#0056b3; color:white; padding:10px; width:100%; border:none; font-size:16px; cursor:pointer;">

    </form>

</body>
</html>
