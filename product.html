<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Registration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0a3d62, #3c6382);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 400px;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #0a3d62;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
      color: #333;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      outline: none;
      transition: 0.3s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #0a3d62;
      box-shadow: 0 0 5px rgba(10, 61, 98, 0.5);
    }

    textarea {
      resize: none;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #0a3d62;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #3c6382;
    }

    .footer-text {
      text-align: center;
      margin-top: 15px;
      font-size: 12px;
      color: #777;
    }

    @media(max-width: 450px) {
      .container {
        width: 90%;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Product Registration</h2>

    <form>
      <div class="form-group">
        <label>Product Name</label>
        <input type="text" placeholder="Enter product name" required>
      </div>

      <div class="form-group">
        <label>Product Category</label>
        <select required>
          <option value="">Select category</option>
          <option>Electronics</option>
          <option>Clothing</option>
          <option>Food</option>
          <option>Furniture</option>
        </select>
      </div>

      <div class="form-group">
        <label>Price ($)</label>
        <input type="number" placeholder="Enter price" required>
      </div>

      <div class="form-group">
        <label>Quantity</label>
        <input type="number" placeholder="Enter quantity" required>
      </div>

      <div class="form-group">
        <label>Supplier Name</label>
        <input type="text" placeholder="Enter supplier name">
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea rows="3" placeholder="Enter product description"></textarea>
      </div>

      <button type="submit" class="btn">Register Product</button>
    </form>

    <div class="footer-text">
      © 2026 Your Company
    </div>
  </div>

</body>
</html>
