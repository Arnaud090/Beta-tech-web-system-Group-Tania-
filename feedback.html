<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Feedback Form</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #0f4c81, #3a86ff);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 15px;
        width: 400px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        animation: fadeIn 1s ease-in-out;
    }

    h2 {
        text-align: center;
        color: #0f4c81;
        margin-bottom: 20px;
    }

    .input-group {
        margin-bottom: 15px;
    }

    label {
        font-weight: 600;
        color: #333;
        display: block;
        margin-bottom: 5px;
    }

    input, select, textarea {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        transition: 0.3s;
    }

    input:focus, select:focus, textarea:focus {
        border-color: #3a86ff;
        outline: none;
        box-shadow: 0 0 5px rgba(58,134,255,0.5);
    }

    textarea {
        resize: none;
        height: 80px;
    }

    .rating {
        display: flex;
        justify-content: space-between;
    }

    .rating input {
        display: none;
    }

    .rating label {
        font-size: 20px;
        color: #ccc;
        cursor: pointer;
        transition: 0.3s;
    }

    .rating input:checked ~ label,
    .rating label:hover,
    .rating label:hover ~ label {
        color: gold;
    }

    .radio-group {
        display: flex;
        gap: 10px;
    }

    .radio-group label {
        font-weight: normal;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #0f4c81, #3a86ff);
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: linear-gradient(135deg, #3a86ff, #0f4c81);
        transform: scale(1.05);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>

<body>

<div class="container">
    <h2>Customer Feedback</h2>

    <form>
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Phone</label>
            <input type="tel" placeholder="Enter your phone">
        </div>

        <div class="input-group">
            <label>Service/Product</label>
            <select required>
                <option value="">Select</option>
                <option>Website</option>
                <option>Mobile App</option>
                <option>Customer Service</option>
                <option>Other</option>
            </select>
        </div>

        <div class="input-group">
            <label>Rating</label>
            <div class="rating">
                <input type="radio" name="rating" id="r5"><label for="r5">★</label>
                <input type="radio" name="rating" id="r4"><label for="r4">★</label>
                <input type="radio" name="rating" id="r3"><label for="r3">★</label>
                <input type="radio" name="rating" id="r2"><label for="r2">★</label>
                <input type="radio" name="rating" id="r1"><label for="r1">★</label>
            </div>
        </div>

        <div class="input-group">
            <label>Your Feedback</label>
            <textarea placeholder="Write your feedback..." required></textarea>
        </div>

        <div class="input-group">
            <label>Would you recommend us?</label>
            <div class="radio-group">
                <label><input type="radio" name="recommend"> Yes</label>
                <label><input type="radio" name="recommend"> No</label>
            </div>
        </div>

        <div class="input-group">
            <label>Upload Screenshot (optional)</label>
            <input type="file">
        </div>

        <button type="submit">Submit Feedback</button>
    </form>
</div>

</body>
</html>
