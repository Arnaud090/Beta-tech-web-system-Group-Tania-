<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beta Tech System</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
        }

        nav {
            background-color: #333;
            padding: 15px;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        .content {
            padding: 20px;
        }

        section {
            margin-bottom: 40px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav>
        <a href="#login">Login</a>
        <a href="#employee">Employee</a>
        <a href="#product">Product</a>
        <a href="#feedback">Feedback</a>
        <a href="#booking">Booking</a>
    </nav>

    <div class="content">

        <!-- LOGIN -->
        <section id="login">
            <h2>Login Form</h2>
        </section>

        <!-- EMPLOYEE -->
        <section id="employee">
            <h2>Employee Registration</h2>
        </section>

        <!-- PRODUCT -->
        <section id="product">
            <h2>Product Registration</h2>
        </section>

        <!-- FEEDBACK -->
        <section id="feedback">
            <h2>Customer Feedback</h2>
        </section>

        <!-- BOOKING -->
        <section id="booking">
            <h2>Event Booking</h2>
        </section>

    </div>

</body>
</html>
