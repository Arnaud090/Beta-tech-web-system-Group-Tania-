<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { max-width: 400px; width: 100%; background: white; border-radius: 12px; box-shadow: 0 15px 50px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .form-container { padding: 35px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 6px; color: #333; font-weight: 600; font-size: 13px; }
        .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 14px; transition: 0.3s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 2px rgba(102,126,234,0.1); }
        .pwd-group { position: relative; }
        .toggle-pwd { position: absolute; right: 12px; top: 32px; cursor: pointer; font-size: 16px; color: #667eea; }
        .checkbox-group { display: flex; align-items: center; margin: 15px 0; }
        .checkbox-group input { width: auto; margin-right: 8px; }
        .checkbox-group label { margin: 0; font-size: 13px; font-weight: 500; }
        .login-btn { width: 100%; padding: 11px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-bottom: 12px; }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.3); }
        .links { text-align: center; font-size: 13px; }
        .links a { color: #667eea; text-decoration: none; font-weight: 600; margin: 0 10px; }
        .message { padding: 10px; border-radius: 5px; margin-bottom: 15px; display: none; font-size: 13px; }
        .error { background: #ffebee; color: #c62828; border-left: 3px solid #c62828; }
        .success { background: #e8f5e9; color: #2e7d32; border-left: 3px solid #2e7d32; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Login</h1>
            <p>Welcome Back</p>
        </div>
        <div class="form-container">
            <div id="msg" class="message"></div>
            <form id="form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter username" required minlength="3" pattern="[a-zA-Z0-9_]+">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter email" required>
                </div>
                <div class="form-group">
                    <label>Class / Role</label>
                    <select id="class" required>
                        <option value="">Select Class</option>
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                        <option value="admin">Admin</option>
                        <option value="parent">Parent</option>
                    </select>
                </div>
                <div class="form-group pwd-group">
                    <label>Password</label>
                    <input type="password" id="pwd" placeholder="Enter password" required minlength="6">
                    <span class="toggle-pwd" onclick="togglePwd()">👁️</span>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember me</label>
                </div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>
            <div class="links">
                <a href="#" onclick="alert('Reset link sent')">Forgot Password?</a> | 
                <a href="#" onclick="alert('Redirect to signup')">Sign Up</a>
            </div>
        </div>
    </div>

    <script>
        function togglePwd() { 
            const pwd = document.getElementById('pwd');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
        }
        function showMsg(text, type) { 
            const msg = document.getElementById('msg');
            msg.innerHTML = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
        }
        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const userClass = document.getElementById('class').value;
            const remember = document.getElementById('remember').checked;
            
            const user = { username, email, userClass, timestamp: new Date().toLocaleString() };
            
            if (remember) localStorage.setItem('user', JSON.stringify(user));
            sessionStorage.setItem('currentUser', JSON.stringify(user));
            showMsg('✓ Login successful! Redirecting...', 'success');
            setTimeout(() => console.log('Logged in:', user), 1500);
        }
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('user');
            if (saved) {
                const user = JSON.parse(saved);
                document.getElementById('username').value = user.username;
                document.getElementById('email').value = user.email;
                document.getElementById('class').value = user.userClass;
                document.getElementById('remember').checked = true;
            }
        });
    </script>
</body>
</html>
